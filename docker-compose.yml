networks:
  api-network:
    driver: bridge

services:
  gateway:
    build: ./gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    networks:
      - api-network
    depends_on:
      - backend
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3

  backend:
    build: ./backend
    container_name: backend-service
    networks:
      - api-network
    expose:
      - "8001"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health', timeout=2)"]
      interval: 30s